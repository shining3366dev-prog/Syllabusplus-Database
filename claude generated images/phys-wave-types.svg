<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" style="display:block;width:100%;height:auto" role="img" aria-label="Transverse waves oscillate at ninety degrees to the travel direction; longitudinal waves oscillate along it, making compressions and rarefactions">
  <title>Transverse and longitudinal waves</title>

  <!-- TRANSVERSE (top) -->
  <path d="M70,90 C100,50 130,50 160,90 C190,130 220,130 250,90 C280,50 310,50 340,90 C370,130 400,130 430,90" fill="none" stroke="#b0653f" stroke-width="3.5" stroke-linecap="round"/>
  <!-- oscillation arrow (perpendicular) -->
  <g stroke="#2a2620" stroke-width="2" fill="#2a2620" stroke-linecap="round"><line x1="250" y1="58" x2="250" y2="122"/><polygon points="244,66 250,52 256,66" stroke="none"/><polygon points="244,114 250,128 256,114" stroke="none"/></g>
  <!-- travel arrow -->
  <g stroke="#3f6a8c" stroke-width="2.5" fill="#3f6a8c" stroke-linecap="round"><line x1="70" y1="150" x2="445" y2="150"/><polygon points="437,144 453,150 437,156" stroke="none"/></g>

  <!-- LONGITUDINAL (bottom) -->
  <g stroke="#b0653f" stroke-width="3" stroke-linecap="round">
    <!-- compression (tight) -->
    <line x1="70" y1="245" x2="70" y2="305"/><line x1="80" y1="245" x2="80" y2="305"/><line x1="90" y1="245" x2="90" y2="305"/>
    <!-- rarefaction (spread) -->
    <line x1="120" y1="245" x2="120" y2="305"/><line x1="145" y1="245" x2="145" y2="305"/><line x1="170" y1="245" x2="170" y2="305"/>
    <!-- compression -->
    <line x1="195" y1="245" x2="195" y2="305"/><line x1="205" y1="245" x2="205" y2="305"/><line x1="215" y1="245" x2="215" y2="305"/>
    <!-- rarefaction -->
    <line x1="245" y1="245" x2="245" y2="305"/><line x1="270" y1="245" x2="270" y2="305"/><line x1="295" y1="245" x2="295" y2="305"/>
    <!-- compression -->
    <line x1="320" y1="245" x2="320" y2="305"/><line x1="330" y1="245" x2="330" y2="305"/><line x1="340" y1="245" x2="340" y2="305"/>
    <!-- rarefaction -->
    <line x1="370" y1="245" x2="370" y2="305"/><line x1="395" y1="245" x2="395" y2="305"/><line x1="420" y1="245" x2="420" y2="305"/>
  </g>
  <!-- travel arrow -->
  <g stroke="#3f6a8c" stroke-width="2.5" fill="#3f6a8c" stroke-linecap="round"><line x1="70" y1="330" x2="445" y2="330"/><polygon points="437,324 453,330 437,336" stroke="none"/></g>
  <!-- markers for compression / rarefaction -->
  <g stroke="#2a2620" stroke-width="1.3" fill="#2a2620"><line x1="205" y1="235" x2="205" y2="222"/><circle cx="205" cy="222" r="2"/><line x1="270" y1="235" x2="270" y2="222"/><circle cx="270" cy="222" r="2"/></g>

  <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#2a2620" paint-order="stroke" stroke="#ffffff" stroke-width="3.6" stroke-linejoin="round">
    <text data-label="transverse" x="455" y="60" text-anchor="end">Transverse</text>
    <text data-label="oscillation" x="262" y="86" text-anchor="start">oscillation (90° to travel)</text>
    <text data-label="travel" x="250" y="170" text-anchor="middle" fill="#2f5870">direction of wave travel</text>
    <text data-label="longitudinal" x="455" y="262" text-anchor="end">Longitudinal</text>
    <text data-label="compression" x="205" y="216" text-anchor="middle">Compression</text>
    <text data-label="rarefaction" x="270" y="216" text-anchor="middle">Rarefaction</text>
  </g>
</svg>
