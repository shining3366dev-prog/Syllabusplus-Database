<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" style="display:block;width:100%;height:auto" role="img" aria-label="Hooke's law force-extension graph: a straight proportional line up to the limit of proportionality, then it curves away">
  <title>Hooke's law and the limit of proportionality</title>
  <g stroke="#2a2620" stroke-width="2.5" fill="#2a2620" stroke-linecap="round">
    <line x1="70" y1="300" x2="488" y2="300"/><polygon points="488,294 502,300 488,306" stroke="none"/>
    <line x1="70" y1="300" x2="70" y2="42"/><polygon points="64,42 70,28 76,42" stroke="none"/>
  </g>
  <!-- proportional (straight) part then curve beyond limit -->
  <path d="M70,300 L330,120 C370,92 400,84 450,82" fill="none" stroke="#b0653f" stroke-width="3.5" stroke-linecap="round"/>
  <!-- limit of proportionality marker -->
  <g stroke="#2a2620" stroke-width="1.6" stroke-dasharray="5 4"><line x1="330" y1="120" x2="330" y2="300"/><line x1="330" y1="120" x2="70" y2="120"/></g>
  <circle cx="330" cy="120" r="5.5" fill="#2a2620"/>
  <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#2a2620" paint-order="stroke" stroke="#ffffff" stroke-width="3.6" stroke-linejoin="round">
    <text data-label="f_axis" x="86" y="44" text-anchor="start">Force, F (N)</text>
    <text data-label="x_axis" x="430" y="326" text-anchor="middle">Extension, x (m)</text>
    <text data-label="linear" x="150" y="210" text-anchor="start" transform="rotate(-29 150 210)">F = k·x (proportional)</text>
    <text data-label="limit" x="338" y="112" text-anchor="start">Limit of proportionality</text>
  </g>
</svg>
