<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" style="display:block;width:100%;height:auto" role="img" aria-label="A velocity-time graph: the gradient is acceleration and the area under the line is the distance travelled">
  <title>Velocity-time graph</title>
  <!-- area under line = distance -->
  <polygon points="70,300 90,255 445,90 445,300" fill="#b0653f" fill-opacity="0.15"/>
  <g stroke="#2a2620" stroke-width="2.5" fill="#2a2620" stroke-linecap="round">
    <line x1="70" y1="300" x2="488" y2="300"/><polygon points="488,294 502,300 488,306" stroke="none"/>
    <line x1="70" y1="300" x2="70" y2="42"/><polygon points="64,42 70,28 76,42" stroke="none"/>
  </g>
  <line x1="90" y1="255" x2="445" y2="90" stroke="#b0653f" stroke-width="3.5" stroke-linecap="round"/>
  <!-- slope triangle -->
  <g stroke="#2a2620" stroke-width="1.6" stroke-dasharray="5 4" fill="none">
    <line x1="210" y1="199" x2="330" y2="199"/>
    <line x1="330" y1="199" x2="330" y2="143"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#2a2620" paint-order="stroke" stroke="#ffffff" stroke-width="3.6" stroke-linejoin="round">
    <text data-label="v_axis" x="86" y="44" text-anchor="start">Velocity (m/s)</text>
    <text data-label="t_axis" x="430" y="326" text-anchor="middle">Time (s)</text>
    <text data-label="gradient" x="344" y="172" text-anchor="start">gradient = acceleration</text>
    <text data-label="area" x="250" y="282" text-anchor="middle">area = distance travelled</text>
  </g>
</svg>
