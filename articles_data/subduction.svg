<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Cross-section of an oceanic plate subducting beneath a continental plate, forming a trench and a volcano">
  <title>Subduction</title>
  <!-- sky + mantle -->
  <rect x="0" y="0" width="600" height="120" fill="#e9edf0"/>
  <rect x="0" y="120" width="600" height="180" fill="#c7a079"/>

  <!-- oceanic lithosphere plate (descends to the lower-right) -->
  <path d="M0,116 L285,116 L432,250 L450,264 L312,150 L0,150 Z" fill="#586b62" stroke="#3c453f" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- continental plate -->
  <path d="M310,116 L600,104 L600,214 L372,214 L318,150 L310,128 Z" fill="#9c7c54" stroke="#6f5736" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ocean + trench -->
  <path d="M0,90 L300,90 L309,150 L285,118 L0,118 Z" fill="#6e93a8"/>
  <g stroke="#9fbccb" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M30,100 q12,-6 24,0 t24,0"/>
    <path d="M120,104 q12,-6 24,0 t24,0"/>
    <path d="M210,100 q12,-6 24,0 t24,0"/>
  </g>

  <!-- magma chamber + conduit -->
  <ellipse cx="404" cy="206" rx="20" ry="10" fill="#c0603f"/>
  <path d="M404,198 C396,172 412,150 400,120" fill="none" stroke="#c0603f" stroke-width="6" stroke-linecap="round"/>

  <!-- volcano -->
  <path d="M366,118 L434,118 L409,78 L391,78 Z" fill="#6e553f" stroke="#4f3d2c" stroke-width="1.5" stroke-linejoin="round"/>
  <g fill="#c0603f"><circle cx="400" cy="72" r="6"/><circle cx="390" cy="64" r="4"/><circle cx="411" cy="65" r="4"/><circle cx="400" cy="56" r="3"/></g>

  <!-- plate-motion + subduction arrows -->
  <g fill="#33302b" stroke="#33302b" stroke-width="4" stroke-linecap="round">
    <line x1="74" y1="104" x2="146" y2="104"/>
    <polygon points="146,98 160,104 146,110" stroke="none"/>
    <line x1="560" y1="92" x2="492" y2="92"/>
    <polygon points="492,86 478,92 492,98" stroke="none"/>
    <line x1="340" y1="170" x2="392" y2="226"/>
    <polygon points="384,222 398,234 380,234" stroke="none"/>
  </g>
</svg>
